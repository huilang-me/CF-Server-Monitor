name: 部署到 Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:

jobs:
  deploy:
    name: 部署
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 安装依赖
        run: npm ci

      - name: 🏗️ 构建前端资源
        run: npm run build:frontend

      - name: 🛠️ 注入生产配置
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          API_SECRET: ${{ secrets.API_SECRET }}
          API_USER_NAME: ${{ secrets.API_USER_NAME }}
          LONG_RETENTION: ${{ secrets.LONG_RETENTION }}
        run: |
          if [ -z "$D1_DATABASE_ID" ]; then
            echo "D1_DATABASE_ID 未配置"
            exit 1
          fi

          LONG_RETENTION_VALUE="${LONG_RETENTION:-false}"

          sed -i "s|database_id = \"local\"|database_id = \"$D1_DATABASE_ID\"|g" wrangler.toml
          sed -i "s|API_SECRET = \".*\"|API_SECRET = \"$API_SECRET\"|g" wrangler.toml
          sed -i "s|API_USER_NAME = \".*\"|API_USER_NAME = \"$API_USER_NAME\"|g" wrangler.toml
          sed -i "s|LONG_RETENTION = \".*\"|LONG_RETENTION = \"$LONG_RETENTION_VALUE\"|g" wrangler.toml

          echo "wrangler.toml 已更新"

      - name: 🚀 部署到 Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy

      - name: ✅ 部署成功
        if: success()
        run: echo "部署成功"

      - name: ❌ 部署失败
        if: failure()
        run: echo "部署失败，请检查日志"

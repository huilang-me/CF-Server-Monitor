name: 部署到 Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 部署
    steps:
      - name: 📥 结账代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 改用LTS版本，解决与Wrangler v4的兼容问题
          cache: 'npm'

      - name: 📦 安装依赖项
        run: npm ci  # 用npm ci替代npm install，保证依赖版本一致性

      - name: 📝 创建 wrangler.toml
        run: |
          cat > wrangler.toml << 'WEOF'
          name = "server-monitor-pro"
          main = "src/index.js"
          compatibility_date = "2024-12-01"
          compatibility_flags = ["nodejs_compat"]
          
          # 每日定时任务（UTC 0点，即北京时间8点）
          [triggers]
          crons = ["0 0 * * *"]
          
          [assets]
          directory = "./public"
          binding = "ASSETS"
          
          [[d1_databases]]
          binding = "DB"
          database_name = "server-monitor-db"
          database_id = "D1_PLACEHOLDER"
          
          [vars]
          API_SECRET = "SECRET_PLACEHOLDER"
          API_USER_NAME = "USER_NAME_PLACEHOLDER"
          WEOF
          
          # 替换占位符（修正变量名与占位符的对应关系）
          sed -i "s|D1_PLACEHOLDER|${{ secrets.D1_DATABASE_ID }}|g" wrangler.toml
          sed -i "s|SECRET_PLACEHOLDER|${{ secrets.API_SECRET }}|g" wrangler.toml
          sed -i "s|USER_NAME_PLACEHOLDER|${{ secrets.API_USER_NAME }}|g" wrangler.toml
          
          echo "✅ wrangler.toml 已生成"
          cat wrangler.toml  # 输出配置文件内容，方便调试

      - name: 🚀 部署到 Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "4"  # 修正引号格式，避免解析错误
          command: deploy
        env:
          CF_WRANGLER_LOG_LEVEL: debug  # 开启Wrangler调试日志，方便排查错误

      - name: ✅ 部署成功
        if: success()
        run: |
          echo "==============================================="
          echo "🎉 部署成功！"
          echo "==============================================="

      - name: ❌ 部署失败
        if: failure()
        run: |
          echo "==============================================="
          echo "💥 部署失败！请检查上方Wrangler调试日志"
          echo "==============================================="
